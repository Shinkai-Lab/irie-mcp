name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    # Linux と macOS の両方で回す。macOS は flock 不在・bash 3.2・CWD 依存など
    # Linux では踏まないクロスプラットフォームの差異を検出するために必須。
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MCP SDK
        run: npm install --prefix room/mcp

      - name: Syntax-check MCP server (JS)
        run: node --check room/mcp/server.js

      - name: Diagnostics (bash version + server boot)
        run: |
          echo "bash (PATH): $(bash --version | head -1)"
          echo "bash (/bin): $(/bin/bash --version | head -1)"
          which -a bash || true
          echo "python: $(python --version)"
          room="${RUNNER_TEMP:-/tmp}/diag-room"
          mkdir -p "$room"
          echo '{"members":[{"name":"alice","role":"human","display_color":"#fff"}]}' > "$room/config.json"
          IRIE_ROOM="$room" IRIE_HOST=127.0.0.1 IRIE_PORT=8910 python web/api-server.py &
          pid=$!
          for i in $(seq 1 20); do
            curl -sf -o /dev/null "http://127.0.0.1:8910/" && break || sleep 0.5
          done
          curl -sS -m5 -o /dev/null -w "GET / -> %{http_code}\n" "http://127.0.0.1:8910/" || echo "SERVER UNREACHABLE"
          kill "$pid" 2>/dev/null || true

      - name: Run test suite
        run: python -m unittest discover -s tests -t . -v
