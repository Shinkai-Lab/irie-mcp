<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>irie — 会議室</title>
<link rel="icon" type="image/png" href="/irie-icon.png">
<style>
  /* ===== Themes (既存パレットを踏襲) ===== */
  :root, [data-theme="default"] {
    --bg-primary: #1a2a3a; --bg-secondary: #0f2030; --bg-input: #1a2a3a;
    --border: #1a6090; --accent: #e87040; --accent-hover: #d06030;
    --text: #e0e8f0; --text-muted: #8090a0; --text-success: #40c8a0;
    --highlight: #2090c0; --avatar-human: #e87040; --avatar-ai: #2090c0;
    --btn-text: #fff;
    --col-open: #2070b0; --col-in_progress: #c08020; --col-done: #209060; --col-closed: #606060;
  }
  [data-theme="light"] {
    --bg-primary: #f0e8f4; --bg-secondary: #e0d0e8; --bg-input: #f8f0fc;
    --border: #c0a8d0; --accent: #a060c0; --accent-hover: #8848a8;
    --text: #3a2848; --text-muted: #8870a0; --text-success: #0eab6c;
    --highlight: #c078d8; --avatar-human: #e08090; --avatar-ai: #80b0d0;
    --btn-text: #fff;
    --col-open: #6090c0; --col-in_progress: #c0a050; --col-done: #50a070; --col-closed: #a090a0;
  }
  [data-theme="dark"] {
    --bg-primary: #0a1628; --bg-secondary: #061020; --bg-input: #0a1628;
    --border: #0f3060; --accent: #e04860; --accent-hover: #c03850;
    --text: #d0d8e0; --text-muted: #607080; --text-success: #38b898;
    --highlight: #1868a8; --avatar-human: #e04860; --avatar-ai: #1868a8;
    --btn-text: #38b898;
    --col-open: #1a5a90; --col-in_progress: #a07020; --col-done: #1a7050; --col-closed: #404850;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'Segoe UI',sans-serif; background:var(--bg-primary); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* ===== Header ===== */
  #header { padding:8px 16px; background:var(--bg-secondary); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; flex-shrink:0; }
  #header h1 { font-size:16px; color:var(--accent); }
  #header .info { font-size:12px; color:var(--text-muted); }
  #header .status { font-size:12px; color:var(--text-success); }
  #menu-toggle { display:none; padding:4px 8px; background:var(--highlight); color:var(--btn-text); border:none; border-radius:4px; font-size:12px; cursor:pointer; }
  #lang-btn { margin-left:auto; padding:2px 8px; background:var(--highlight); color:var(--btn-text); border:1px solid var(--border); border-radius:3px; font-size:11px; cursor:pointer; }

  #main { flex:1; display:flex; overflow:hidden; }

  /* ===== Left rail: tabs + quick view + detail ===== */
  #rail { width:290px; flex-shrink:0; background:var(--bg-secondary); display:flex; flex-direction:column; min-height:0; }
  .tab-bar { display:flex; gap:4px; padding:10px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .tab-btn { flex:1; padding:8px 0; text-align:center; border-radius:7px; border:1px solid transparent; background:var(--bg-input); cursor:pointer; font-size:16px; transition:all .15s; color:var(--text); }
  .tab-btn span { display:block; font-size:8px; color:var(--text-muted); margin-top:2px; }
  .tab-btn:hover { border-color:var(--border); }
  .tab-btn.active { border-color:var(--accent); background:var(--bg-primary); }

  /* Quick View (Tickets タブのみ) */
  #qv-zone { display:flex; flex-direction:column; min-height:0; flex:0 1 auto; max-height:46%; }
  .qv-head { padding:11px 14px 6px; font-size:11px; font-weight:bold; color:var(--text-success); letter-spacing:.04em; text-transform:uppercase; display:flex; justify-content:space-between; align-items:center; gap:6px; flex-shrink:0; }
  .qv-head .qv-actions { display:flex; gap:8px; }
  .qv-hint { font-size:9px; color:var(--text-muted); font-weight:normal; text-transform:none; cursor:pointer; }
  .qv-hint:hover { color:var(--accent); }
  #quick-list { padding:4px 10px 8px; overflow-y:auto; }
  .qv-card { background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:9px 10px; margin-bottom:8px; cursor:pointer; border-left:3px solid var(--col-open); transition:transform .08s, border-color .15s; user-select:none; }
  .qv-card:hover { border-color:var(--accent); transform:translateX(2px); }
  .qv-card.sel { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .qv-card.in_progress { border-left-color:var(--col-in_progress); }
  .qv-card.done { border-left-color:var(--col-done); }
  .qv-card.closed { border-left-color:var(--col-closed); }
  .qv-card .qv-top { display:flex; justify-content:space-between; align-items:center; gap:6px; margin-bottom:4px; }
  .qv-card .qv-id { font-size:9px; color:var(--text-muted); }
  .qv-card .qv-title { font-size:12px; line-height:1.35; color:var(--text); }
  .qv-card .qv-meta { font-size:9px; color:var(--text-muted); margin-top:5px; display:flex; align-items:center; gap:5px; }

  .status-pill { font-size:8px; padding:2px 7px; border-radius:10px; color:#fff; white-space:nowrap; }
  .p-open{background:var(--col-open)} .p-in_progress{background:var(--col-in_progress)} .p-done{background:var(--col-done)} .p-closed{background:var(--col-closed)}
  .chip { width:15px; height:15px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:8px; color:#fff; margin-right:3px; }

  /* Detail (多目的: チケ詳細 / Files / Config / Diagram) */
  #rail-detail { flex:1 1 auto; border-top:2px solid var(--border); display:flex; flex-direction:column; min-height:0; background:var(--bg-primary); }
  .rd-head { padding:9px 14px; font-size:11px; font-weight:bold; color:var(--accent); text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .rd-head .rd-id { color:var(--text-muted); font-weight:normal; }
  #rail-detail-body { padding:13px 14px; overflow-y:auto; flex:1; }
  .rd-empty { color:var(--text-muted); font-size:11px; text-align:center; margin-top:24px; line-height:1.7; }
  .field { margin-bottom:13px; }
  .field .label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px; }
  .field .value { font-size:12.5px; line-height:1.5; }
  .field select, .field textarea, .field input { width:100%; background:var(--bg-input); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:6px 8px; font-size:12px; font-family:inherit; }
  .field textarea { min-height:60px; resize:vertical; }
  .comment { border-left:2px solid var(--border); padding:3px 0 3px 9px; margin-bottom:8px; white-space:pre-wrap; word-break:break-word; }
  .comment .c-who { font-size:10px; color:var(--text-muted); margin-bottom:2px; }
  .comment .c-txt { font-size:12px; line-height:1.45; }
  .rd-btn { padding:6px 12px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:12px; }
  .rd-btn:hover { background:var(--accent-hover); }
  .rd-btn.ghost { background:var(--highlight); }

  .file-item { padding:6px 0; font-size:12px; border-bottom:1px solid var(--border); }
  .file-item a { color:var(--highlight); text-decoration:none; word-break:break-all; }
  .file-item .f-meta { font-size:9px; color:var(--text-muted); }
  .file-item .thumb { width:100%; max-height:90px; object-fit:cover; border-radius:4px; margin-bottom:3px; }
  #upload-label { display:block; padding:8px; text-align:center; border:1px dashed var(--border); border-radius:6px; cursor:pointer; font-size:11px; color:var(--text-muted); margin-bottom:10px; }
  #upload-label:hover { border-color:var(--text-success); color:var(--text-success); }

  /* ===== Resize handles ===== */
  .rz-col { width:5px; background:transparent; cursor:col-resize; flex-shrink:0; transition:background .15s; }
  .rz-col:hover, .rz-col.drag { background:var(--accent); }
  .rz-row { height:5px; background:transparent; cursor:row-resize; flex-shrink:0; transition:background .15s; }
  .rz-row:hover, .rz-row.drag { background:var(--accent); }
  #rz-board { display:none; }
  #center.board-open #rz-board { display:block; }

  /* ===== Center: chat (default, large) + board overlay (top, when open) ===== */
  #center { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

  #board-wrap { display:none; flex:none; height:62%; flex-direction:column; min-height:90px; }
  #center.board-open #board-wrap { display:flex; }
  .board-head { padding:9px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); background:var(--bg-secondary); flex-shrink:0; }
  .board-head h2 { font-size:13px; color:var(--accent); }
  .board-head .sub { font-size:11px; color:var(--text-muted); }
  .board-head .spacer { margin-left:auto; }
  .board-head .close-x { background:none; border:none; color:var(--accent); cursor:pointer; font-size:18px; line-height:1; padding:0 4px; }
  #board { flex:1; display:flex; gap:12px; padding:14px; overflow-x:auto; overflow-y:hidden; }
  .col { width:230px; flex-shrink:0; background:var(--bg-secondary); border-radius:10px; display:flex; flex-direction:column; max-height:100%; }
  .col.closed-col { width:170px; }
  .col-head { padding:9px 12px; font-size:11px; font-weight:bold; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); cursor:default; }
  .col.closed-col .col-head { cursor:pointer; }
  .col-head .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
  .col-head .cnt { font-size:10px; color:var(--text-muted); background:var(--bg-input); border-radius:9px; padding:1px 7px; }
  .col-body { padding:8px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:8px; }
  .col.folded .col-body { display:none; }

  .card { background:var(--bg-input); border:1px solid var(--border); border-radius:9px; padding:10px 11px; cursor:pointer; transition:transform .08s, border-color .15s, box-shadow .15s; }
  .card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,.3); }
  .card.sel { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .card .c-id { font-size:9px; color:var(--text-muted); }
  .card .c-title { font-size:12.5px; line-height:1.4; margin:3px 0 8px; }
  .card .c-foot { display:flex; align-items:center; justify-content:space-between; }
  .card .c-foot .left { display:flex; align-items:center; gap:6px; font-size:9px; color:var(--text-muted); }
  .card .tagline { height:4px; border-radius:3px; margin-bottom:8px; opacity:.8; }
  /* #7 drag & drop */
  .card.dragging { opacity:.45; }
  .col.drop-target { outline:2px dashed var(--accent); outline-offset:-3px; background:rgba(160,160,160,.08); }
  .col.drop-target.folded .col-body { display:flex; }   /* 折畳closedをドラッグ中だけ一時展開 */

  /* chat (default large; shrinks to bottom when board open) */
  #chat-wrap { flex:1; display:flex; flex-direction:column; background:var(--bg-primary); min-height:90px; border-top:2px solid var(--border); }
  #center:not(.board-open) #chat-wrap { border-top:none; }
  .chat-head { padding:7px 16px; font-size:11px; color:var(--text-muted); background:var(--bg-secondary); border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-shrink:0; }
  #messages { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
  /* #6: 初期ロードで前方省略時のバナー／closedアーカイブの「+N件」表示 */
  .older-banner { text-align:center; font-size:10px; color:var(--text-muted); padding:4px 0; opacity:.8; flex-shrink:0; }
  .archive-more { text-align:center; font-size:10px; color:var(--text-muted); padding:6px 0 2px; opacity:.8; }
  .msg { display:flex; gap:8px; align-items:flex-start; }
  .msg .avatar { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; background:var(--avatar-ai); color:#fff; }
  .msg .body { flex:1; }
  .msg .meta { font-size:10px; color:var(--text-muted); margin-bottom:1px; }
  .msg .meta .name { font-weight:bold; margin-right:6px; }
  .msg .text { font-size:13px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
  .msg.system .text { font-style:italic; font-size:11px; opacity:.5; }
  .msg.system .avatar { background:var(--bg-secondary); color:var(--text-muted); }
  .msg.system .name { color:var(--text-muted); }

  #mention-bar { padding:4px 12px; display:flex; gap:4px; flex-shrink:0; flex-wrap:wrap; }
  .mention-badge { padding:2px 8px; border-radius:12px; font-size:11px; cursor:pointer; user-select:none; border:1px solid var(--border); color:var(--text-muted); background:transparent; transition:all .15s; }
  .mention-badge.active { border-color:currentColor; color:#fff; }
  .mention-badge:hover { opacity:.8; }
  #attach-preview { display:none; padding:3px 12px; background:var(--bg-secondary); font-size:11px; color:var(--text-success); flex-shrink:0; }
  #input-area { padding:8px 12px; background:var(--bg-secondary); border-top:1px solid var(--border); display:flex; gap:6px; align-items:flex-end; flex-shrink:0; }
  #input-area label { padding:8px; cursor:pointer; font-size:16px; color:var(--text-muted); flex-shrink:0; }
  #input-area textarea { flex:1; padding:8px 10px; border:1px solid var(--border); border-radius:6px; background:var(--bg-input); color:var(--text); font-size:13px; outline:none; font-family:inherit; line-height:1.3; max-height:100px; overflow-y:auto; resize:none; }
  #input-area textarea:focus { border-color:var(--accent); }
  #input-area button { padding:8px 14px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; flex-shrink:0; align-self:flex-end; }
  #input-area button:hover { background:var(--accent-hover); }
  #input-area button:disabled { background:#555; cursor:not-allowed; }

  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  @media (max-width: 760px) {
    #rail { display:none; width:auto !important; }
    #rail.open { display:flex; position:absolute; top:45px; left:0; bottom:0; width:80% !important; z-index:10; border-right:1px solid var(--border); }
    #menu-toggle { display:block; }
    .rz-col, .rz-row { display:none !important; }
  }
</style>
</head>
<body>

<div id="header">
  <img id="header-icon" src="/irie-icon-3.png" style="width:28px;height:28px;border-radius:50%;object-fit:cover;background:#fff;padding:1px;">
  <h1>irie</h1>
  <button id="menu-toggle" onclick="document.getElementById('rail').classList.toggle('open')">☰</button>
  <span class="info" id="meeting-id"></span>
  <span class="status">●</span>
  <button id="lang-btn" onclick="switchLang()">EN/JA</button>
</div>

<div id="main">

  <!-- ===== Left rail: tabs + quick view + detail ===== -->
  <div id="rail">
    <div class="tab-bar">
      <div class="tab-btn active" id="tool-tickets" title="チケット" onclick="setTab('tickets')">📋<span data-i18n="tickets">Tickets</span></div>
      <div class="tab-btn" id="tool-files" title="ファイル" onclick="setTab('files')">📎<span data-i18n="files">Files</span></div>
      <div class="tab-btn" id="tool-diagram" title="図表" onclick="setTab('diagram')" style="display:none">🧩<span>Diagram</span></div>
      <div class="tab-btn" id="tool-config" title="設定" onclick="setTab('config')">⚙️<span data-i18n="config">Config</span></div>
    </div>

    <!-- Quick View（Tickets タブのみ表示） -->
    <div id="qv-zone">
      <div class="qv-head"><span>Quick View</span><span class="qv-actions">
        <span class="qv-hint" id="qv-open-board" onclick="openBoard()" title="看板を開く">📋 <span data-i18n="open_board">看板</span></span>
        <span class="qv-hint" onclick="showNewTicket()" title="新規チケット">＋ <span data-i18n="new_label">新規</span></span>
      </span></div>
      <div id="quick-list"></div>
    </div>

    <!-- QuickView ↔ Detail 境界（Tickets タブのみ） -->
    <div class="rz-row" id="rz-qv"></div>

    <!-- 多目的 Detail -->
    <div id="rail-detail">
      <div class="rd-head"><span id="rd-label">Detail</span><span class="rd-id" id="rd-id"></span></div>
      <div id="rail-detail-body"></div>
    </div>
  </div>

  <!-- レール ↔ 中央 境界（幅） -->
  <div class="rz-col" id="rz-rail"></div>

  <!-- ===== Center: chat (large, default) + board overlay (top, when open) ===== -->
  <div id="center">
    <div id="board-wrap">
      <div class="board-head">
        <h2>📋 <span data-i18n="board_title">チケット看板</span></h2>
        <span class="sub" data-i18n="board_sub">カードをクリックで左下に詳細</span>
        <span class="spacer"></span>
        <button class="rd-btn ghost" onclick="showNewTicket()" data-i18n="new_ticket">＋ チケット</button>
        <button class="close-x" onclick="closeBoard()" title="閉じる">✕</button>
      </div>
      <div id="board"></div>
    </div>

    <!-- 看板 ↔ チャット 境界（高さ・看板オープン時） -->
    <div class="rz-row" id="rz-board"></div>

    <div id="chat-wrap">
      <div class="chat-head">💬 <span data-i18n="chat">チャット</span><span style="color:var(--text-success)">● <span data-i18n="in_meeting">会議中</span></span></div>
      <div id="messages"></div>
      <div id="mention-bar"></div>
      <div id="attach-preview"><span id="attach-name"></span><button onclick="clearAttach()" style="background:none;border:none;color:var(--accent);cursor:pointer;margin-left:6px;">✕</button></div>
      <div id="input-area">
        <label for="chat-file-input" title="ファイル添付">＋</label>
        <input type="file" id="chat-file-input" style="display:none" onchange="attachFile(this)">
        <textarea id="msg-input" placeholder="メッセージ（Ctrl+Vで画像貼付）" data-i18n-placeholder="msg_placeholder" rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()" data-i18n="send">送信</button>
      </div>
    </div>
  </div>

</div>

<script>
// ===== Token provisioning (#token=... / ?token=... は受け取り次第 URL から除去) =====
(function() {
  const fromQuery = new URLSearchParams(location.search).get('token');
  const fromHash = new URLSearchParams((location.hash || '').replace(/^#/, '')).get('token');
  const provided = fromHash || fromQuery;
  if (provided) {
    localStorage.setItem('irie-token', provided);
    history.replaceState(null, '', location.pathname);
  }
})();
const API_TOKEN = localStorage.getItem('irie-token') || '';
function authH(base) { const h = Object.assign({}, base || {}); if (API_TOKEN) h['X-Irie-Token'] = API_TOKEN; return h; }
// CSS/属性に差し込む色は hex のみ許可（display_color 経由の CSS/HTML インジェクション防止）
function safeColor(c) { return /^#[0-9a-fA-F]{3,8}$/.test(c || '') ? c : ''; }
const API_BASE = `${location.origin}/api`;

// ===== State =====
const STATUS = {
  open:        { label:'Open',        dot:'var(--col-open)',        cls:'p-open' },
  in_progress: { label:'In Progress', dot:'var(--col-in_progress)', cls:'p-in_progress' },
  done:        { label:'Done',        dot:'var(--col-done)',        cls:'p-done' },
  closed:      { label:'Closed',      dot:'var(--col-closed)',      cls:'p-closed' },
};
const STATUS_ORDER = ['open','in_progress','done','closed'];
// #6(スケーリング): チャットDOMの上限。超えたら古い順に間引く。closed列の展開時の表示上限。
const MAX_DOM_MESSAGES = 300;
const CLOSED_VISIBLE = 30;
let lastSeq = 0;
let firstLoad = true;  // #6: 最初の poll かどうか（truncated バナー判定用）
let i18n = {};
let myName = '';
let currentLang = (localStorage.getItem('irie-lang') || (navigator.language.startsWith('ja') ? 'ja' : 'en'));
const shownSeqs = new Set();
let pendingFile = null;
let _configCache = { members: [] };
let _ticketsCache = [];
let _filesCache = [];
let selectedId = null;
let _selectedSnapshot = null;  // 表示中チケットのスナップショット（#8: 無変化なら再描画しない）
let activeTab = 'tickets';     // tickets | files | config | diagram
let boardOpen = false;         // 看板オーバーレイ（Tickets タブ専用）
let closedFolded = true;
const activeMentions = new Set();

const msgInput = document.getElementById('msg-input');
const messagesDiv = document.getElementById('messages');

// ===== i18n =====
async function loadI18n(lang) {
  try {
    const res = await fetch(`${location.origin}/i18n/${lang}.json`);
    if (res.ok) { i18n = await res.json(); currentLang = lang; localStorage.setItem('irie-lang', lang); applyI18n(); }
  } catch(e) { console.warn('i18n load failed:', lang); }
}
function t(key, vars) {
  let s = i18n[key] || key;
  if (vars) Object.entries(vars).forEach(([k,v]) => { s = s.replace(`{${k}}`, v); });
  return s;
}
function applyI18n() {
  if (i18n.app_title) document.title = i18n.app_title;
  document.querySelectorAll('[data-i18n]').forEach(el => { const v = i18n[el.dataset.i18n]; if (v) el.textContent = v; });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { const v = i18n[el.dataset.i18nPlaceholder]; if (v) el.placeholder = v; });
}
function switchLang() { loadI18n(currentLang === 'ja' ? 'en' : 'ja'); }

// ===== Helpers =====
function escapeHtml(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function avatarInitial(n) { return n === 'system' ? 'S' : (Array.from(n || '')[0] || '?'); }
function formatSize(b) { return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB'; }
function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
function memberColor(name) { const m = (_configCache.members || []).find(x => x.name === name); return safeColor(m && m.display_color); }
function chip(name) {
  if (!name) return `<span style="opacity:.6">${escapeHtml(t('unassigned'))}</span>`;
  const c = memberColor(name) || '#7890a0';
  return `<span class="chip" style="background:${c}">${escapeHtml(avatarInitial(name))}</span>${escapeHtml(name)}`;
}
function fmtTime(s) { try { return s ? new Date(s).toLocaleString('ja-JP') : ''; } catch(e) { return escapeHtml(s||''); } }

// ===== Tabs (Tickets/Files/Config/Diagram) =====
function setTab(name) {
  activeTab = name;
  ['tickets','files','config','diagram'].forEach(k => document.getElementById('tool-'+k)?.classList.toggle('active', k===name));
  // Quick View（＋その境界ハンドル）は Tickets タブのみ
  const isTickets = name === 'tickets';
  document.getElementById('qv-zone').style.display = isTickets ? '' : 'none';
  document.getElementById('rz-qv').style.display = (isTickets && !isMobile()) ? '' : 'none';
  // 看板は Tickets タブ専用オーバーレイ：他タブでは自動で畳む（boardOpen 状態は保持＝復帰時に復元）
  renderCenter();
  if (isTickets) {
    if (selectedId != null && _ticketsCache.find(x => x.id === selectedId)) selectTicket(selectedId);
    else renderDetailEmpty();
  } else {
    selectedId = null; markSelected(null);
    if (name === 'files') renderFilesView();
    else if (name === 'config') renderConfigView();
    else if (name === 'diagram') renderDiagramView();
  }
}
function setRdLabel(label, id) {
  document.getElementById('rd-label').textContent = label;
  document.getElementById('rd-id').textContent = id || '';
}
function renderDetailEmpty() {
  setRdLabel(t('detail'), '');
  document.getElementById('rail-detail-body').innerHTML =
    `<div class="rd-empty">${escapeHtml(t('detail_empty'))}<br><br>${escapeHtml(t('detail_empty2'))}</div>`;
}

// ===== 看板オーバーレイ（中央上段） =====
function renderCenter() {
  const open = (activeTab === 'tickets' && boardOpen);
  document.getElementById('center').classList.toggle('board-open', open);
  // 開く導線はオープン中は隠す

  if (open) { renderBoard(); applyBoardHeight(); }

}

function closeBoard() { boardOpen = false; renderCenter(); }

// ===== Quick View (最新チケット 3件) =====
function renderQuick() {
  const key = tk => tk.updated_at || tk.created_at || '';
  const recent = [..._ticketsCache].sort((a,b) => (key(b)).localeCompare(key(a)) || (b.id||0)-(a.id||0)).slice(0,3);
  const html = recent.map(tk => {
    const cls = STATUS[tk.status] ? tk.status : 'open';
    let ut = '';
    try { const d = key(tk); if (d) ut = new Date(d).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); } catch(e) {}
    return `<div class="qv-card ${cls}" id="qv-${tk.id}" onclick="selectTicket(${tk.id})" ondblclick="openBoard();selectTicket(${tk.id})">
      <div class="qv-top"><span class="qv-id">#${tk.id}</span><span class="status-pill ${(STATUS[tk.status]||STATUS.open).cls}">${(STATUS[tk.status]||STATUS.open).label}</span></div>
      <div class="qv-title">${escapeHtml(tk.title)}</div>
      <div class="qv-meta">${chip(tk.assignee)}${ut?' · '+escapeHtml(ut):''}</div>
    </div>`;
  }).join('');
  document.getElementById('quick-list').innerHTML = html || `<div class="rd-empty" style="margin-top:8px">${escapeHtml(t('no_tickets'))}</div>`;
  if (selectedId != null) markSelected(selectedId);
}

// ===== Board =====
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = STATUS_ORDER.map(st => {
    const items = _ticketsCache.filter(tk => (tk.status||'open') === st);
    const isClosed = st === 'closed';
    const folded = isClosed && closedFolded;
    // #6(スケーリング): closed は無限に積み上がるので、
    //  ・折畳中は本体を一切生成しない（件数のみ）＝CSS隠しで全件生成していた肥大の解消
    //  ・展開時も直近 CLOSED_VISIBLE 件だけ描画し、超過分は「+N 件」表示に畳む
    let bodyHtml;
    if (isClosed) {
      if (folded) {
        bodyHtml = '';
      } else {
        const recent = [...items].sort((a,b) =>
          (b.updated_at||b.created_at||'').localeCompare(a.updated_at||a.created_at||'') || (b.id||0)-(a.id||0));
        const shown = recent.slice(0, CLOSED_VISIBLE);
        const hidden = recent.length - shown.length;
        bodyHtml = shown.map(cardHtml).join('')
          + (hidden > 0 ? `<div class="archive-more">${escapeHtml(t('archived_more', {n: hidden}))}</div>` : '');
      }
    } else {
      bodyHtml = items.map(cardHtml).join('');
    }
    return `<div class="col ${isClosed?'closed-col':''} ${folded?'folded':''}" data-col="${st}" ondragover="colDragOver(event,this)" ondragleave="colDragLeave(event,this)" ondrop="colDrop(event,'${st}')">
      <div class="col-head" ${isClosed?`onclick="toggleClosed()"`:''}>
        <span><span class="dot" style="background:${STATUS[st].dot}"></span>${isClosed&&folded?'▶ ':''}${STATUS[st].label}</span>
        <span class="cnt">${items.length}</span>
      </div>
      <div class="col-body">${bodyHtml}</div>
    </div>`;
  }).join('');
  if (selectedId != null) markSelected(selectedId);
}
function cardHtml(tk) {
  const n = (tk.comments && tk.comments.length) ? tk.comments.length : 0;
  return `<div class="card" id="card-${tk.id}" draggable="true" ondragstart="cardDragStart(event,${tk.id})" ondragend="cardDragEnd(event)" onclick="cardClick(${tk.id})">
    <div class="tagline" style="background:${(STATUS[tk.status]||STATUS.open).dot}"></div>
    <div class="c-id">#${tk.id}</div>
    <div class="c-title">${escapeHtml(tk.title)}</div>
    <div class="c-foot"><span class="left">${chip(tk.assignee)}</span><span class="left">${n?('💬 '+n):''}</span></div>
  </div>`;
}
function toggleClosed() { closedFolded = !closedFolded; renderBoard(); }

// ===== #7 看板 drag & drop（status 変更・楽観更新） =====
let _dragTid = null;
let _lastDragEnd = 0;
function cardDragStart(e, id) {
  _dragTid = id;
  try { e.dataTransfer.setData('text/plain', String(id)); e.dataTransfer.effectAllowed = 'move'; } catch(_) {}
  document.getElementById('card-'+id)?.classList.add('dragging');
}
function cardDragEnd(e) {
  if (_dragTid != null) document.getElementById('card-'+_dragTid)?.classList.remove('dragging');
  document.querySelectorAll('.col.drop-target').forEach(c => c.classList.remove('drop-target'));
  _dragTid = null;
  _lastDragEnd = Date.now();   // 直後の click（selectTicket）誤爆を抑止
}
function cardClick(id) {
  if (Date.now() - _lastDragEnd < 250) return;   // ドラッグ直後のクリックは無視
  selectTicket(id);
}
function colDragOver(e, col) {
  if (_dragTid == null) return;
  e.preventDefault();
  try { e.dataTransfer.dropEffect = 'move'; } catch(_) {}
  col.classList.add('drop-target');
}
function colDragLeave(e, col) {
  if (!col.contains(e.relatedTarget)) col.classList.remove('drop-target');
}
function colDrop(e, st) {
  e.preventDefault();
  const col = e.currentTarget; if (col) col.classList.remove('drop-target');
  const id = _dragTid; _dragTid = null;
  if (id == null) return;
  const tk = _ticketsCache.find(x => x.id === id);
  if (!tk || (tk.status || 'open') === st) return;   // 同列ドロップ=no-op
  // 楽観更新：DOM即移動→サーバ確定→次loadTicketsで整合（失敗時は再描画で自己修復）
  tk.status = st;
  renderBoard();
  if (activeTab === 'tickets') renderQuick();
  updateTicketField(id, 'status', st);
}

// ===== Chat =====
function addMessage(msg) {
  const div = document.createElement('div');
  div.className = `msg ${msg.author==='system'?'system':''}`;
  const color = msg.author === 'system' ? '' : memberColor(msg.author);
  const avatarStyle = color ? ` style="background:${color}"` : '';
  const nameStyle = color ? ` style="color:${color}"` : '';
  div.innerHTML = `
    <div class="avatar"${avatarStyle}>${escapeHtml(avatarInitial(msg.author))}</div>
    <div class="body">
      <div class="meta"><span class="name"${nameStyle}>${escapeHtml(msg.author)}</span><span>${new Date(msg.ts).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</span></div>
      <div class="text">${escapeHtml(msg.text)}</div>
    </div>`;
  messagesDiv.appendChild(div);
  pruneMessages();
}

// #6(スケーリング): DOM上限を超えたら古い .msg ノードから間引く。
// いまは log(jsonl) が真実なので "消す" だけでOK。将来 上スクロールで遡る場合は
// 間引いた範囲を /api/pull?since=... で再取得できる前提（earliest_seq を活用）。
// 先頭の older-banner は .msg ではないので間引き対象から自然に外れる。
function pruneMessages() {
  const msgs = messagesDiv.getElementsByClassName('msg');
  while (msgs.length > MAX_DOM_MESSAGES) {
    messagesDiv.removeChild(msgs[0]);
  }
}

// 初期ロードで前方が省略されている時に出す「以前のメッセージは省略」バナー。
function setOlderBanner(truncated) {
  let banner = document.getElementById('older-banner');
  if (truncated) {
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'older-banner';
      banner.className = 'older-banner';
      banner.textContent = t('older_hidden');
      messagesDiv.insertBefore(banner, messagesDiv.firstChild);
    }
  } else if (banner) {
    banner.remove();
  }
}

  document.getElementById('rail-detail-body').innerHTML = `
    <div class="field"><div class="label">${escapeHtml(t('title_label'))}</div><input id="nt-title" placeholder="${escapeHtml(t('title_placeholder'))}"></div>
    <div class="field"><div class="label">${escapeHtml(t('assignee_label'))}</div>
      <select id="nt-assignee">${opts.map(a=>`<option value="${escapeHtml(a)}">${a?escapeHtml(a):escapeHtml(t('unassigned'))}</option>`).join('')}</select></div>
    <div class="field"><div class="label">${escapeHtml(t('desc_label'))}</div><textarea id="nt-desc" placeholder="${escapeHtml(t('desc_placeholder'))}"></textarea></div>

async function createTicket() {
  const title = document.getElementById('nt-title').value.trim();
  if (!title) return;
  const assignee = document.getElementById('nt-assignee').value;
  const desc = document.getElementById('nt-desc')?.value || '';
  try {
    const res = await fetch(`${API_BASE}/tickets/create`, {
      method:'POST', headers:authH({'Content-Type':'application/json'}),
      body: JSON.stringify({ title, assignee: assignee||null, created_by: myName || undefined, description: desc })
    });
    const data = await res.json();
    if (data.ok && data.ticket) {
      const tk = data.ticket;
      await fetch(`${API_BASE}/post`, { method:'POST', headers:authH({'Content-Type':'application/json'}),
        body: JSON.stringify({ author: myName || undefined, text:`[チケット作成] #${tk.id} ${tk.title}${tk.assignee?' → '+tk.assignee:''}` }) });
      await loadTickets(); await poll();
      selectTicket(tk.id);
    }
  } catch(e) {}
}

// ===== Ticket update =====
async function updateTicketField(id, field, value) {
  const body = { id }; body[field] = value;
  try {
    const res = await fetch(`${API_BASE}/tickets/update`, {
      method: 'POST', headers: authH({'Content-Type':'application/json'}), body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.ok) {
      await fetch(`${API_BASE}/post`, {
        method: 'POST', headers: authH({'Content-Type':'application/json'}),
        body: JSON.stringify({ author: myName || undefined, text: `[チケット更新] #${id} ${field} → ${value}` })
      });
      await poll();
    }
  } catch(e) {
  } finally {
    // #7 nit(a): fetch が throw しても必ず照合＝楽観更新を即時に自己修復（最大5s残りを解消）
    await loadTickets();
  }
}

// ===== Mention bar =====
function buildMentionBar() {
  const bar = document.getElementById('mention-bar');
  bar.innerHTML = '';
  (_configCache.members || []).filter(m => m.role !== 'system').forEach(m => {
    const btn = document.createElement('span');
    btn.className = 'mention-badge';
    btn.textContent = m.name;
    btn.style.borderColor = safeColor(m.display_color) || 'var(--border)';
    if (activeMentions.has(m.name)) { btn.classList.add('active'); btn.style.background = (safeColor(m.display_color)||'#0f3460')+'33'; }
    btn.onclick = () => {
      if (activeMentions.has(m.name)) { activeMentions.delete(m.name); btn.classList.remove('active'); btn.style.background='transparent'; }
      else { activeMentions.add(m.name); btn.classList.add('active'); btn.style.background = (safeColor(m.display_color)||'#0f3460')+'33'; }
    };
    bar.appendChild(btn);
  });
}

// ===== File attach / paste =====
function attachFile(input) {
  if (input.files[0]) { pendingFile = input.files[0]; document.getElementById('attach-name').textContent = pendingFile.name; document.getElementById('attach-preview').style.display = 'block'; }
  input.value = '';
}
function clearAttach() { pendingFile = null; document.getElementById('attach-preview').style.display = 'none'; }
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items; if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const blob = item.getAsFile();
      pendingFile = new File([blob], `clipboard.${item.type.split('/')[1]||'png'}`, {type:item.type});
      document.getElementById('attach-name').textContent = pendingFile.name;
      document.getElementById('attach-preview').style.display = 'block';
      msgInput.focus(); break;
    }
  }
});

// ===== Send =====
msgInput.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey&&!e.isComposing&&e.keyCode!==229) { e.preventDefault(); sendMessage(); } });
msgInput.addEventListener('input', () => { msgInput.style.height='auto'; msgInput.style.height=Math.min(msgInput.scrollHeight,100)+'px'; });
async function sendMessage() {
  const text = msgInput.value.trim();
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  if (pendingFile) {
    const file = pendingFile; clearAttach();
    const fd = new FormData(); fd.append('file', file); if (myName) fd.append('author', myName);
    try {
      const ures = await fetch(`${API_BASE}/upload`, {method:'POST', headers: authH(), body: fd});
      const udata = await ures.json();
      if (udata.ok) {
        const f = udata.file;
        const attachText = text ? `${text}\n[添付: ${f.name} (${location.origin}/uploads/${f.stored})]` : `[添付: ${f.name} (${location.origin}/uploads/${f.stored})]`;
        const mentionPrefix = [...activeMentions].map(n => '@' + n).join(' ');
        const chatText = mentionPrefix ? mentionPrefix + ' ' + attachText : attachText;
        await fetch(`${API_BASE}/post`, {method:'POST', headers:authH({'Content-Type':'application/json'}), body: JSON.stringify({author: myName || undefined, text: chatText})});
        await loadFiles();
      }
    } catch(e) {}
    msgInput.value = ''; msgInput.style.height = 'auto'; btn.disabled = false; msgInput.focus(); await poll(); return;
  }
  if (!text) { btn.disabled = false; return; }
  const mentions = [...activeMentions].map(n => '@' + n).join(' ');
  const fullText = mentions ? mentions + ' ' + text : text;
  msgInput.value = '';
  try {
    await fetch(`${API_BASE}/post`, {method:'POST', headers:authH({'Content-Type':'application/json'}), body: JSON.stringify({author: myName || undefined, text: fullText})});
    await poll();
  } catch(e) { msgInput.value = text; }
  msgInput.style.height = 'auto'; btn.disabled = false; msgInput.focus();
}

// ===== Data loaders =====
async function poll() {
  try {
    const res = await fetch(`${API_BASE}/pull?since=${lastSeq}`, {headers: authH()});
    if (!res.ok) return;
    const data = await res.json();
    if (data.meeting) document.getElementById('meeting-id').textContent = data.meeting;
    // #6: 初期ロード(since=0)の窓で前方が切れていれば「以前のメッセージは省略」を表示。
    if (firstLoad) { setOlderBanner(!!data.truncated); firstLoad = false; }
    if (data.messages?.length) {
      let added = false;
      data.messages.forEach(m => { if (!shownSeqs.has(m.seq)) { shownSeqs.add(m.seq); addMessage(m); added = true; } if (m.seq > lastSeq) lastSeq = m.seq; });
      if (added) scrollToBottom();
    }
  } catch(e) {}
}
async function loadTickets() {
  try {
    const res = await fetch(`${API_BASE}/tickets`, {headers: authH()});
    if (!res.ok) return;
    const data = await res.json();
    _ticketsCache = data.tickets || [];
    if (activeTab === 'tickets') renderQuick();
    if (boardOpen && activeTab === 'tickets') renderBoard();
    // 開いているチケ詳細を最新状態に追従（render-on-change）。
    // #8: データが実際に変化した時のみ再投影する。無変化なら再描画しない＝詳細textareaの
    // 手動リサイズ等のローカルUI状態を保持＋ちらつき防止。さらに編集中(フォーカス)はスキップ。
    if (selectedId != null && activeTab === 'tickets') {
      const fresh = _ticketsCache.find(x => x.id === selectedId);
      const ae = document.activeElement;
      const editing = ae && document.getElementById('rail-detail')?.contains(ae)
        && ['TEXTAREA','SELECT','INPUT'].includes(ae.tagName);
      if (fresh && !editing && JSON.stringify(fresh) !== _selectedSnapshot) selectTicket(selectedId);
    }
  } catch(e) {}
}
async function loadFiles() {
  try {
    const res = await fetch(`${API_BASE}/files`, {headers: authH()});
    if (!res.ok) return;
    const data = await res.json();
    _filesCache = data.files || [];
    if (activeTab === 'files') renderFilesView();
  } catch(e) {}
}
async function loadConfig() {
  try {
    const r = await fetch(`${API_BASE}/config`, {headers: authH()});
    _configCache = await r.json();
    const human = (_configCache.members || []).find(m => m.role === 'human');
    myName = (human && human.name) || '';
    const dia = document.getElementById('tool-diagram');
    if (dia) dia.style.display = (_configCache.plugins && _configCache.plugins.diagram) ? '' : 'none';
  } catch(e) {}
  return _configCache;
}

// ===== Resize handles（localStorage 永続・min/max クランプ・モバイル無効） =====
function isMobile() { return window.innerWidth <= 760; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
// 幅: rail（縦ハンドル）
function applyRailWidth() {
  if (isMobile()) return;
  const w = parseInt(localStorage.getItem('irie-rail-w') || '', 10);
  if (w) document.getElementById('rail').style.width = clamp(w, 200, 520) + 'px';
}
// 高さ: 看板（横ハンドル）— 中央の高さに対する px
function applyBoardHeight() {
  if (isMobile()) return;
  const h = parseInt(localStorage.getItem('irie-board-h') || '', 10);
  const bw = document.getElementById('board-wrap');
  if (h) { const max = document.getElementById('center').clientHeight - 120; bw.style.height = clamp(h, 90, Math.max(120, max)) + 'px'; }
}
// 高さ: QuickView（横ハンドル）
function applyQvHeight() {
  if (isMobile()) return;
  const h = parseInt(localStorage.getItem('irie-qv-h') || '', 10);
  const qv = document.getElementById('qv-zone');
  if (h) { qv.style.flex = '0 0 ' + clamp(h, 80, 420) + 'px'; qv.style.maxHeight = 'none'; }
}
function initDragCol(handleId, targetId, storeKey, lo, hi) {
  const handle = document.getElementById(handleId); if (!handle) return;
  handle.addEventListener('mousedown', e => {
    if (isMobile()) return;
    e.preventDefault();
    const target = document.getElementById(targetId);
    const startX = e.clientX, startW = target.offsetWidth;
    handle.classList.add('drag');
    const move = e2 => { const w = clamp(startW + (e2.clientX - startX), lo, hi); target.style.width = w + 'px'; localStorage.setItem(storeKey, String(w)); };
    const up = () => { handle.classList.remove('drag'); document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
  });
}
function initDragRow(handleId, targetId, storeKey, lo, hiFn) {
  const handle = document.getElementById(handleId); if (!handle) return;
  handle.addEventListener('mousedown', e => {
    if (isMobile()) return;
    e.preventDefault();
    const target = document.getElementById(targetId);
    const startY = e.clientY, startH = target.offsetHeight;
    handle.classList.add('drag');
    const move = e2 => {
      const hi = (typeof hiFn === 'function') ? hiFn() : hiFn;
      const h = clamp(startH + (e2.clientY - startY), lo, hi);
      if (targetId === 'qv-zone') { target.style.flex = '0 0 ' + h + 'px'; target.style.maxHeight = 'none'; }
      else target.style.height = h + 'px';
      localStorage.setItem(storeKey, String(h));
    };
    const up = () => { handle.classList.remove('drag'); document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
  });
}
initDragCol('rz-rail', 'rail', 'irie-rail-w', 200, 520);
initDragRow('rz-board', 'board-wrap', 'irie-board-h', 90, () => document.getElementById('center').clientHeight - 120);
initDragRow('rz-qv', 'qv-zone', 'irie-qv-h', 80, 420);

// ===== Theme init =====
(function() {
  const th = localStorage.getItem('irie-theme') || 'default';
  document.documentElement.setAttribute('data-theme', th);
  const icon = THEME_ICONS[th] || THEME_ICONS.default;
  const hdr = document.getElementById('header-icon'); if (hdr) hdr.src = icon;
  const fav = document.querySelector('link[rel="icon"]'); if (fav) fav.href = icon;
})();

// ===== #4 SSE 購読（fetch + ReadableStream：EventSource と違い X-Irie-Token を付けられ、
// トークンを URL に載せずに済む＝非流出）。setInterval ポーリングは撤去し、変化イベントで再描画。 =====
const sleep = ms => new Promise(r => setTimeout(r, ms));
function handleSSE(chunk) {
  let ev = 'message', data = '';
  for (const ln of chunk.split('\n')) {
    if (ln.startsWith(':')) return;                 // コメント行（: ping ハートビート）は無視
    if (ln.startsWith('event:')) ev = ln.slice(6).trim();
    else if (ln.startsWith('data:')) data += ln.slice(5).trim();
  }
  if (ev !== 'change') return;
  let kinds = [];
  try { kinds = (JSON.parse(data) || {}).kinds || []; } catch(_) {}
  if (!kinds.length || kinds.includes('messages')) poll();
  if (!kinds.length || kinds.includes('tickets')) loadTickets();
  if (!kinds.length || kinds.includes('files')) loadFiles();
}
async function subscribeEvents() {
  while (true) {
    try {
      const res = await fetch(`${API_BASE}/events`, { headers: authH() });
      if (!res.ok || !res.body) { await sleep(3000); continue; }
      // (再)接続直後に必ずフル同期＝切断中の取りこぼしを回収（since=lastSeq で差分のみ）
      await poll(); await loadTickets(); await loadFiles();
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        let idx;
        while ((idx = buf.indexOf('\n\n')) >= 0) {
          handleSSE(buf.slice(0, idx));
          buf = buf.slice(idx + 2);
        }
      }
    } catch(e) {}
    await sleep(2000);   // 切断時の再接続バックオフ
  }
}

// ===== Boot =====
applyRailWidth();
applyQvHeight();
document.getElementById('rz-qv').style.display = isMobile() ? 'none' : '';
loadI18n(currentLang).then(async () => {
  setTab('tickets');     // i18n 解決後に初期タブ描画（既定: Tickets、看板は閉じた状態＝chat 全高）
  await loadConfig();
  buildMentionBar();
  await loadTickets();
  await loadFiles();
  await poll();
  subscribeEvents();     // 以降はサーバからの push で変化時のみ再描画（ポーリング廃止）
});
</script>
